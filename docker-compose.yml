version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: senha_root_secreta
      MYSQL_DATABASE: meu_banco_de_dados
      MYSQL_USER: usuario_admin
      MYSQL_PASSWORD: senha_admin
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  adminer:
    image: adminer
    container_name: adminer_ui
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  db_data: